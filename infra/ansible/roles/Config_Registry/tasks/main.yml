# roles/Config_Registry/tasks/main.yml
---
- name: Remove misplaced config_path
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*config_path\s*='
    state: absent

- name: Add registry config for containerd v2
  ansible.builtin.blockinfile:
    path: /etc/containerd/config.toml
    block: |
      [plugins."io.containerd.cri.v1.images".registry]
        config_path = "/etc/containerd/certs.d"
    marker: "# {mark} ANSIBLE MANAGED - REGISTRY CONFIG"
  notify: Restart containerd

- name: Create Nexus registry config directory
  ansible.builtin.file:
    path: /etc/containerd/certs.d/51.178.52.51:8019
    state: directory
    mode: "0755"

- name: Configure insecure registry for Nexus
  ansible.builtin.copy:
    dest: /etc/containerd/certs.d/51.178.52.51:8019/hosts.toml
    content: |
      server = "http://51.178.52.51:8019"
      [host."http://51.178.52.51:8019"]
        capabilities = ["pull", "resolve"]
        skip_verify = true
    mode: "0644"
  notify: Restart containerd

- name: Flush handlers
  meta: flush_handlers