---
# tasks file for Config_Kube

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Initialize Kubernetes cluster
  ansible.builtin.command:
    cmd: kubeadm init --pod-network-cidr=192.168.0.0/16
    creates: /etc/kubernetes/admin.conf

- name: Create .kube directory
  ansible.builtin.file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ec2-user/.kube/config
    remote_src: true
    owner: ec2-user
    group: ec2-user
    mode: "0600"

- name: Install Calico CNI
  become: false
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config

- name: Generate join command
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_command

- name: Store join command as fact
  ansible.builtin.set_fact:
    kubeadm_join_command: "{{ join_command.stdout }}"

- name: Label all nodes
  ansible.builtin.command:
    cmd: "kubectl label nodes {{ hostvars[item]['ansible_facts']['fqdn'] }} role={{ hostvars[item]['server_role'] }} --overwrite"
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config
  loop: "{{ groups['all'] }}"