---
# tasks file for Delete_Dashboard

- name: Uninstall Headlamp Helm release
  kubernetes.core.helm:
    name: headlamp
    release_namespace: dashboard
    state: absent
    wait: true

- name: Delete Dashboard namespace
  kubernetes.core.k8s:
    kind: Namespace
    name: dashboard
    state: absent
