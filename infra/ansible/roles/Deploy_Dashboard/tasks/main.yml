---
- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  become: true

- name: Copy Headlamp values
  copy:
    src: values.yaml
    dest: /tmp/headlamp-values.yaml

- name: Copy Headlamp IngressRoute
  copy:
    src: ingressroute.yaml
    dest: /tmp/headlamp-ingressroute.yaml

- name: Add Headlamp Helm repo
  kubernetes.core.helm_repository:
    name: headlamp
    repo_url: https://kubernetes-sigs.github.io/headlamp/

- name: Deploy Headlamp Dashboard
  kubernetes.core.helm:
    name: headlamp
    chart_ref: headlamp/headlamp
    release_namespace: dashboard
    create_namespace: true
    values_files:
      - /tmp/headlamp-values.yaml
    wait: true

- name: Apply Headlamp IngressRoute
  kubernetes.core.k8s:
    src: /tmp/headlamp-ingressroute.yaml
    state: present

- name: Copy Headlamp ServiceAccount manifest
  copy:
    src: serviceaccount.yaml
    dest: /tmp/headlamp-serviceaccount.yaml

- name: Apply Headlamp ServiceAccount and token
  kubernetes.core.k8s:
    src: /tmp/headlamp-serviceaccount.yaml
    state: present

- name: Wait for token to be populated
  kubernetes.core.k8s_info:
    kind: Secret
    name: headlamp-admin-token
    namespace: dashboard
  register: headlamp_secret
  until: headlamp_secret.resources[0].data.token is defined
  retries: 10
  delay: 3

- name: Display Headlamp token
  debug:
    msg: |
      ============================================================
       HEADLAMP TOKEN — colle ce token dans l'UI Headlamp
      ============================================================
      {{ headlamp_secret.resources[0].data.token | b64decode }}
      ============================================================
