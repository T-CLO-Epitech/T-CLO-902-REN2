---

- name: Install required packages
  ansible.builtin.dnf:
    name:
      - conntrack
      - iproute-tc
    state: present

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    reload: true

- name: Load br_netfilter module
  community.general.modprobe:
    name: br_netfilter
    state: present

- name: Enable bridge-nf-call-iptables
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-iptables
    value: "1"
    sysctl_set: true
    reload: true

- name: Add Docker CE repository
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/docker-ce.repo
    content: |
      [docker-ce-stable]
      name=Docker CE Stable
      baseurl=https://download.docker.com/linux/centos/9/$basearch/stable
      enabled=1
      gpgcheck=1
      gpgkey=https://download.docker.com/linux/centos/gpg
    mode: "0644"

- name: Install containerd
  ansible.builtin.dnf:
    name: containerd.io
    state: present

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default config
  ansible.builtin.shell:
    cmd: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable SystemdCgroup
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Enable CRI plugin
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'disabled_plugins = \["cri"\]'
    replace: 'disabled_plugins = []'
  notify: Restart containerd

- name: Enable registry config path
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: 'config_path'
    line: '      config_path = "/etc/containerd/certs.d"'
    insertafter: '\[plugins.*registry\]'
  notify: Restart containerd

- name: Create Nexus registry config directory
  ansible.builtin.file:
    path: /etc/containerd/certs.d/51.178.52.51:8019
    state: directory
    mode: "0755"

- name: Configure insecure registry for Nexus
  ansible.builtin.copy:
    dest: /etc/containerd/certs.d/51.178.52.51:8019/hosts.toml
    content: |
      server = "http://51.178.52.51:8019"
      [host."http://51.178.52.51:8019"]
        capabilities = ["pull", "resolve"]
        skip_verify = true
    mode: "0644"
  notify: Restart containerd

- name: Start and enable containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true