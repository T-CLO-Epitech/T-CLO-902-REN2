apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app
  namespace: argocd
spec:
  project: app
  destination:
    namespace: app
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/T-CLO-Epitech/T-CLO-902-REN2-APP
    targetRevision: main
    path: sample-app-master/helm/app
    helm:
      valueFiles:
        - values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m