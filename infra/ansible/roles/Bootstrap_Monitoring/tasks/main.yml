---
- name: Install baseline tools (monitoring node)
  ansible.builtin.dnf:
    name:
      - chrony
      - curl
    state: present

- name: Enable and start time sync (chronyd)
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true

- name: Create monitoring data directories (hostPath target)
  ansible.builtin.file:
    path: "{{ monitoring_data_root }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - prometheus
    - grafana
    - loki
