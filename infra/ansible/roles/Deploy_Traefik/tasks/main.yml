---
- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  become: true

- name: Copy Traefik values
  copy:
    src: values.yaml
    dest: /tmp/traefik-values.yaml

- name: Add Traefik Helm repo
  kubernetes.core.helm_repository:
    name: traefik
    repo_url: https://traefik.github.io/charts

- name: Check if Traefik Helm release is healthy
  shell: helm status traefik -n traefik 2>/dev/null | grep '^STATUS:' | grep -c 'deployed'
  register: traefik_helm_healthy
  failed_when: false
  changed_when: false

- name: Uninstall failed or orphan Traefik Helm release
  shell: helm uninstall traefik -n traefik 2>/dev/null || true
  when: traefik_helm_healthy.stdout | int == 0

- name: Delete Traefik namespace to ensure clean state
  shell: kubectl delete namespace traefik --ignore-not-found=true
  when: traefik_helm_healthy.stdout | int == 0

- name: Deploy Traefik
  kubernetes.core.helm:
    name: traefik
    chart_ref: traefik/traefik
    release_namespace: traefik
    create_namespace: true
    values_files:
      - /tmp/traefik-values.yaml
    wait: false

- name: Wait for Traefik DaemonSet to be ready
  shell: kubectl rollout status daemonset/traefik -n traefik --timeout=300s