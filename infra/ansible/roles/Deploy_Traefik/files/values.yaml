nodeSelector:
  role: ingress

tolerations:
  - key: "role"
    operator: "Equal"
    value: "ingress"
    effect: "NoSchedule"

hostNetwork: true

service:
  enabled: false

securityContext:
  capabilities:
    add:
      - NET_BIND_SERVICE
    drop:
      - ALL
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0

podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0

ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.kubequest.local`)
    entryPoints:
      - web

providers:
  kubernetesIngress:
    enabled: true