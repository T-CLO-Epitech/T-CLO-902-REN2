deployment:
  kind: DaemonSet

tolerations:
  - operator: Exists
    effect: NoSchedule

service:
  enabled: true
  type: NodePort

ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.kubequest.local`)
    entryPoints:
      - web

providers:
  kubernetesIngress:
    enabled: true
