# deployment:
#   replicas: 2

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
            app.kubernetes.io/instance: traefik
        topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 1

service:
  enabled: true
  type: NodePort

ports:
  web:
    port: 80
    nodePort: 30080
  websecure:
    port: 443
    nodePort: 30443

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.kubequest.local`)
    entryPoints:
      - web

providers:
  kubernetesIngress:
    enabled: true
