---
- name: Install containerd, Kubeadm, Kubelet and Kubectl
  hosts: all
  become: true
  tags: setup
  roles:
    - Deploy_Containerd
    - Deploy_Kube

- name: Configure Master Node
  hosts: kube1
  become: true
  tags: setup
  roles:
    - Init_Kube

- name: Join Worker Nodes to Cluster
  hosts: kube2 monitoring ingress
  become: true
  tags: setup
  roles:
    - Join_Cluster

- name: Normalize node taints (keep kube2 schedulable)
  hosts: kube1
  become: true
  tags:
    - setup
    - taints
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Normalize_Taints

- name: Bootstrap Monitoring Node (directories, time sync)
  hosts: monitoring
  become: true
  tags: setup
  roles:
    - Bootstrap_Monitoring

- name: Deploy Services
  hosts: kube1
  become: true
  tags: services
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Deploy_Traefik
    - Deploy_Argocd

- name: Deploy ArgoCD
  hosts: kube1
  become: true
  tags: argo
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Deploy_Argocd

- name: Deploy Observability stack (kube-prometheus-stack + Loki)
  hosts: kube1
  become: true
  tags: monitoring
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Deploy_Observability
