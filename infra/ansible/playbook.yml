---
- name: Prepare SSH key from vault
  hosts: localhost
  gather_facts: false
  tags: always
  tasks:
    - name: Write SSH private key to temp file
      copy:
        content: "{{ vault_ssh_private_key }}"
        dest: /tmp/kubequest_deploy_key
        mode: '0600'

- name: Install containerd, Kubeadm, Kubelet and Kubectl
  hosts: all
  become: true
  tags: setup
  roles:
    - Deploy_Containerd
    - Deploy_Kube

- name: Configure Master Node
  hosts: controlPlane
  become: true
  tags: setup
  roles:
    - Init_Kube

- name: Join Worker Nodes to Cluster
  hosts: worker
  become: true
  tags: setup
  roles:
    - Join_Cluster

- name: Configure Registry on all nodes
  hosts: all
  become: true
  tags: update
  roles:
    - Config_Registry

- name: Deploy Services
  hosts: controlPlane
  become: true
  gather_facts: false
  tags:
    - never
    - services
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Deploy_Traefik
    - Deploy_Argocd
    - Deploy_Dashboard
    - Deploy_Monitoring
    - Deploy_Loki

- name: Deploy ArgoCD
  hosts: controlPlane
  become: true
  gather_facts: false
  tags:
    - never
    - argo
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Deploy_Argocd

- name: Delete Monitoring
  hosts: controlPlane
  become: true
  gather_facts: false
  tags:
    - never
    - delete-monitoring
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Delete_Monitoring

- name: Delete Loki
  hosts: controlPlane
  become: true
  gather_facts: false
  tags:
    - never
    - delete-loki
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Delete_Loki

- name: Delete services
  hosts: controlPlane
  become: true
  gather_facts: false
  tags:
    - never
    - delete
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - Delete_Traefik
    - Delete_Argocd
    - Delete_App
    - Delete_Dashboard
    - Delete_Loki
    - Delete_Monitoring

